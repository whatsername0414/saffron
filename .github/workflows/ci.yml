name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Provide stand-in Firebase config
        run: cp .github/ci/google-services.json app/google-services.json

      - name: Lint, test, and check style
        run: ./gradlew ktlintCheck test lint --stacktrace
